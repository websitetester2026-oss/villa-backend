<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Luxury Villa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>Villa Admin Dashboard</h1>
            <button id="logoutBtn" style="display: none;">Logout</button>
        </header>

        <main id="mainContent">
            <!-- Login View -->
            <div id="loginView" class="view active">
                <h2>Admin Login</h2>
                <form id="loginForm">
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit">Login</button>
                    <p id="loginError" class="error"></p>
                </form>
            </div>

            <!-- Dashboard View -->
            <div id="dashboardView" class="view" style="display: none;">
                <nav class="tabs">
                    <button class="tab active" onclick="switchTab('bookings')">Bookings</button>
                    <button class="tab" onclick="switchTab('villas')">Villas</button>
                </nav>

                <div id="bookingsTab" class="tab-content active">
                    <h2>Manage Bookings</h2>
                    <table id="bookingsTable">
                        <thead>
                            <tr>
                                <th>Guest</th>
                                <th>Email</th>
                                <th>Villa</th>
                                <th>Check In</th>
                                <th>Check Out</th>
                                <th>Total Price</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>

                <div id="villasTab" class="tab-content" style="display: none;">
                    <h2>Manage Villas</h2>
                    <form id="addVillaForm">
                        <h3>Add New Villa</h3>
                        <input type="text" id="vName" placeholder="Villa Name" required>
                        <input type="number" id="vBedrooms" placeholder="Bedrooms" required>
                        <input type="number" id="vBathrooms" placeholder="Bathrooms" required>
                        <input type="number" id="vMaxGuests" placeholder="Max Guests" required>
                        <input type="number" id="vPrice" placeholder="Price Per Night ($)" required>
                        <textarea id="vDesc" placeholder="Description" required></textarea>
                        <button type="submit">Add Villa</button>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
